<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guest Check-In</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .main-container {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      border: none;
      margin-bottom: 20px;
    }

    .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 20px 20px 0 0 !important;
      padding: 25px;
      text-align: center;
      border: none;
    }

    .card-body {
      padding: 30px;
    }

    .btn-custom {
      padding: 15px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      width: 100%;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .btn-checkin {
      background: #10b981;
      border: none;
      color: white;
    }

    .btn-checkout {
      background: #ef4444;
      border: none;
      color: white;
    }

    .form-control {
      padding: 15px;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
    }

    .alert {
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      border: none;
    }

    .icon-large {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .footer-text {
      text-align: center;
      color: white;
      margin-top: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-person"></i>
        <h3>Guest Check-In Portal</h3>
        <p style="margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.9;">
          <i class="bi bi-calendar3"></i> <span id="currentDate"></span>
        </p>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="text-center mb-4">
          <i class="bi bi-person icon-large text-success"></i>
          <h5>Guest Check-In / Check-Out</h5>
          <p class="text-muted mb-0">This page works with one permanent Guest QR code.</p>
        </div>

        <div class="mb-3">
          <label for="guestFirstName" class="form-label">First Name</label>
          <input type="text" class="form-control" id="guestFirstName" placeholder="Enter your first name" autocomplete="given-name">
        </div>

        <div class="mb-3">
          <label for="guestLastName" class="form-label">Last Name</label>
          <input type="text" class="form-control" id="guestLastName" placeholder="Enter your last name" autocomplete="family-name">
        </div>

        <div id="guestAlertBox"></div>

        <button type="button" class="btn btn-custom btn-checkin" id="guestCheckInBtn">
          <i class="bi bi-box-arrow-in-right"></i> Check In
        </button>

        <button type="button" class="btn btn-custom btn-checkout" id="guestCheckOutBtn">
          <i class="bi bi-box-arrow-left"></i> Check Out
        </button>
      </div>
    </div>

    <div class="footer-text">
      <i class="bi bi-shield-check"></i> Guest Attendance Tracking
    </div>
  </div>

  <script>
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    window.onload = function() {
      document.getElementById('guestCheckInBtn').addEventListener('click', handleGuestCheckIn);
      document.getElementById('guestCheckOutBtn').addEventListener('click', handleGuestCheckOut);

      document.getElementById('guestLastName').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          handleGuestCheckIn();
        }
      });
    };

    function handleGuestCheckIn() {
      const firstName = document.getElementById('guestFirstName').value.trim();
      const lastName = document.getElementById('guestLastName').value.trim();
      const btn = document.getElementById('guestCheckInBtn');

      if (!firstName || !lastName) {
        showGuestAlert('warning', 'Please enter both first and last name');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Checking In...';

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Check In';

          if (result.success) {
            showGuestAlert('success', result.message + '<br><small>You will be automatically checked out after 2 hours.</small>');
            setTimeout(resetGuestForm, 3000);
          } else {
            showGuestAlert('danger', result.message);
          }
        })
        .withFailureHandler(function(error) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Check In';
          showGuestAlert('danger', 'Error: ' + error.message);
        })
        .guestPortalCheckIn(firstName, lastName);
    }

    function handleGuestCheckOut() {
      const firstName = document.getElementById('guestFirstName').value.trim();
      const lastName = document.getElementById('guestLastName').value.trim();
      const btn = document.getElementById('guestCheckOutBtn');

      if (!firstName || !lastName) {
        showGuestAlert('warning', 'Please enter both first and last name');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Checking Out...';

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-left"></i> Check Out';

          if (result.success) {
            showGuestAlert('success', result.message);
            setTimeout(resetGuestForm, 3000);
          } else {
            showGuestAlert('danger', result.message);
          }
        })
        .withFailureHandler(function(error) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-left"></i> Check Out';
          showGuestAlert('danger', 'Error: ' + error.message);
        })
        .guestCheckOut(firstName, lastName);
    }

    function resetGuestForm() {
      document.getElementById('guestFirstName').value = '';
      document.getElementById('guestLastName').value = '';
      document.getElementById('guestAlertBox').innerHTML = '';
    }

    function showGuestAlert(type, message) {
      const iconMap = {
        success: 'check-circle-fill',
        danger: 'x-circle-fill',
        warning: 'exclamation-triangle-fill',
        info: 'info-circle-fill'
      };

      document.getElementById('guestAlertBox').innerHTML = `
        <div class="alert alert-${type}" role="alert">
          <i class="bi bi-${iconMap[type]}"></i> ${message}
        </div>
      `;
    }
  </script>
</body>
</html>
