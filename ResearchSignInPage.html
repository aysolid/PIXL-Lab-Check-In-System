<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Sign-In Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .main-container {
      max-width: 560px;
      margin: 20px auto;
      padding: 20px;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      border: none;
      margin-bottom: 20px;
    }

    .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 20px 20px 0 0 !important;
      padding: 25px;
      text-align: center;
      border: none;
    }

    .card-header h3 {
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .card-header p {
      margin: 6px 0 0 0;
      opacity: 0.95;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .card-body {
      padding: 30px;
    }

    .form-label {
      font-weight: 600;
      color: #374151;
    }

    .form-control {
      padding: 14px;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
    }

    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .btn-custom {
      padding: 15px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      width: 100%;
      transition: all 0.3s ease;
      background: #2563eb;
      border: none;
      color: white;
    }

    .btn-custom:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
    }

    .alert {
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      border: none;
    }

    .footer-text {
      text-align: center;
      color: white;
      margin-top: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-journal-text" style="font-size: 2rem;"></i>
        <h3>PIXL</h3>
        <p>RESEARCH SIGN-IN FORM</p>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <form id="researchSignInForm" novalidate>
          <div class="mb-3">
            <label for="primaryInvestigator" class="form-label">Primary Investigator <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              id="primaryInvestigator"
              placeholder="Enter primary investigator name"
              required
            >
          </div>

          <div class="mb-3">
            <label for="researchAssistants" class="form-label">Research Assistants (if any)</label>
            <input
              type="text"
              class="form-control"
              id="researchAssistants"
              placeholder="Enter assistant names (optional)"
            >
          </div>

          <div class="mb-3">
            <label for="numberOfParticipants" class="form-label">Number of Participants <span class="text-danger">*</span></label>
            <input
              type="number"
              min="0"
              step="1"
              class="form-control"
              id="numberOfParticipants"
              placeholder="Enter participant count"
              required
            >
          </div>

          <div class="mb-3">
            <label for="equipmentUsed" class="form-label">Equipment Used <span class="text-danger">*</span></label>
            <textarea
              class="form-control"
              id="equipmentUsed"
              rows="3"
              placeholder="List equipment used"
              required
            ></textarea>
          </div>

          <div id="alertBox"></div>

          <button type="submit" class="btn btn-custom" id="submitBtn">
            <i class="bi bi-journal-check"></i> Submit Research Sign-In
          </button>
        </form>
      </div>
    </div>

    <div class="footer-text">
      <i class="bi bi-shield-check"></i> PIXL Lab Research Activity Tracking
    </div>
  </div>

  <script>
    window.onload = function() {
      document.getElementById('researchSignInForm').addEventListener('submit', handleSubmit);
    };

    function handleSubmit(event) {
      event.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const payload = {
        primaryInvestigator: document.getElementById('primaryInvestigator').value.trim(),
        researchAssistants: document.getElementById('researchAssistants').value.trim(),
        numberOfParticipants: document.getElementById('numberOfParticipants').value.trim(),
        equipmentUsed: document.getElementById('equipmentUsed').value.trim()
      };

      if (!payload.primaryInvestigator || !payload.numberOfParticipants || !payload.equipmentUsed) {
        showAlert('warning', 'Please complete all required fields.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Submitting...';

      google.script.run
        .withSuccessHandler(function(result) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="bi bi-journal-check"></i> Submit Research Sign-In';

          if (result.success) {
            showAlert('success', result.message + '<br><small>Entry ID: ' + result.entryId + '</small>');
            document.getElementById('researchSignInForm').reset();
          } else {
            showAlert('danger', result.message);
          }
        })
        .withFailureHandler(function(error) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="bi bi-journal-check"></i> Submit Research Sign-In';
          showAlert('danger', 'Error: ' + error.message);
        })
        .submitResearchSignIn(payload);
    }

    function showAlert(type, message) {
      const iconMap = {
        success: 'check-circle-fill',
        danger: 'x-circle-fill',
        warning: 'exclamation-triangle-fill',
        info: 'info-circle-fill'
      };

      document.getElementById('alertBox').innerHTML = `
        <div class="alert alert-${type}" role="alert">
          <i class="bi bi-${iconMap[type]}"></i> ${message}
        </div>
      `;
    }
  </script>
</body>
</html>
